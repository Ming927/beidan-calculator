<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>北单奖金计算器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f0f2f5;color:#333}
.container{max-width:1200px;margin:0 auto;padding:16px}
h1{text-align:center;color:#1a1a2e;margin-bottom:4px;font-size:22px}
.sub{text-align:center;color:#999;font-size:12px;margin-bottom:16px}

.card{background:#fff;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.08);padding:16px;margin-bottom:16px}
.card h2{font-size:16px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #f0f0f0}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

input,select,button{padding:6px 10px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px}
input[type=number]{width:80px}
button{cursor:pointer;transition:all .2s}
.btn-primary{background:#1890ff;color:#fff;border-color:#1890ff;font-size:14px;padding:8px 20px}
.btn-primary:hover{background:#40a9ff}
.btn-primary:disabled{background:#91caff;cursor:not-allowed}
.btn-sm{padding:3px 8px;font-size:11px}

.match-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.match-table th{background:#fafafa;padding:6px;text-align:center;border-bottom:2px solid #e8e8e8;font-size:11px}
.match-table td{padding:5px 6px;text-align:center;border-bottom:1px solid #f0f0f0}
.match-table .tl{text-align:left}
.match-table .won-row{background:#f6ffed}
.match-table tr:hover{background:#f5f5f5}

.chip{display:inline-block;padding:4px 10px;margin:2px;border:1px solid #d9d9d9;border-radius:4px;cursor:pointer;font-size:12px;user-select:none}
.chip.active{background:#1890ff;color:#fff;border-color:#1890ff}
.chip:hover{border-color:#1890ff}

.play-group{margin-bottom:16px;border:1px solid #e8e8e8;border-radius:6px;overflow:hidden}
.play-header{background:#fafafa;padding:10px 14px;font-weight:600;font-size:14px;display:flex;justify-content:space-between;cursor:pointer;user-select:none}
.play-header:hover{background:#f0f0f0}
.play-header .profit{color:#52c41a}
.play-header .loss{color:#ff4d4f}
.play-body.collapsed{display:none}
.play-body{padding:8px 14px}
.play-table{width:100%;border-collapse:collapse;font-size:12px}
.play-table th{background:#f5f5f5;padding:4px 6px;text-align:center;font-size:11px}
.play-table td{padding:4px 6px;text-align:center;border-bottom:1px solid #f5f5f5}
.play-table .won{color:#52c41a;font-weight:600}
.play-table .lost{color:#ccc}

.summary-bar{display:flex;justify-content:space-around;padding:16px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-radius:8px;margin-top:12px}
.summary-item{text-align:center}
.summary-item .num{font-size:26px;font-weight:700}
.summary-item .label{font-size:12px;opacity:0.85;margin-top:2px}

.status-ok{color:#52c41a}.status-err{color:#ff4d4f}.hint{color:#999;font-size:12px}
</style>
</head>
<body>
<div class="container">
<h1>北单奖金计算器</h1>
<p class="sub">数据来源: 500.com | 自动计算全部玩法×全部组合</p>

<!-- Step 1: 期号 -->
<div class="card">
<h2>① 输入期号</h2>
<div class="row">
<input id="issue-no" placeholder="期号,如 26073" style="width:140px" value="26073">
<button class="btn-primary" onclick="fetchIssue()" id="btn-fetch">获取比赛数据</button>
<span id="fetch-status"></span>
<span class="hint" style="margin-left:8px">期号可在 zx.500.com 查询</span>
</div>
</div>

<!-- Step 2: 比赛列表 -->
<div class="card" id="matches-card" style="display:none">
<h2>② 选择场次 <span class="hint" id="match-count"></span></h2>
<div style="margin-bottom:8px;display:flex;flex-wrap:wrap;gap:4px;align-items:center">
<button class="chip active" onclick="selectAll()">比分SP最高15场</button>
<button class="chip" onclick="deselectAll()">清空</button>
<span style="width:1px;background:#ddd;height:20px;margin:0 4px"></span>
<select id="sp-play-type" style="font-size:11px;padding:3px" onchange="updateSPButtons()">
    <option value="让球胜平负">胜平负</option>
    <option value="总进球数">总进球</option>
    <option value="比分" selected>比分</option>
    <option value="上下单双">上下单双</option>
    <option value="半全场">半全场</option>
</select>
<button class="chip" onclick="selectBySP('high')" id="btn-sp-high">最高SP</button>
<button class="chip" onclick="selectBySP('low')" id="btn-sp-low">最低SP</button>
<span style="width:1px;background:#ddd;height:20px;margin:0 4px"></span>
<input id="random-count" type="number" value="5" min="1" max="15" style="width:50px;font-size:11px;padding:3px">
<button class="chip" onclick="selectRandom()">随机选</button>
</div>
<div style="max-height:400px;overflow-y:auto">
<table class="match-table">
<thead><tr><th>选</th><th>场次</th><th>赛事</th><th>时间</th><th>主队</th><th>让球</th><th>客队</th><th>比分</th><th>胜平负</th><th>总进球</th><th>比分SP</th><th>上下单双</th><th>半全场</th></tr></thead>
<tbody id="match-tbody"></tbody>
</table>
</div>
</div>

<!-- Step 3: 串关级别 -->
<div class="card" id="parlay-card" style="display:none">
<h2>③ 串关级别 <span class="hint">（上限15串1；比分最高3串1，总进球/上下单双/半全场最高6串1，超限自动降级）</span></h2>
<div id="parlay-chips"></div>
<div style="margin-top:8px">
<label>倍数: <input id="multiplier" type="number" value="1" min="1" max="99"></label>
</div>
<div class="row" style="margin-top:10px">
<button class="btn-primary" onclick="calculateAll()" id="btn-calc" style="font-size:16px;padding:10px 40px">💰 计算全部组合</button>
<span id="calc-status"></span>
</div>
</div>

<!-- Step 4: 结果 -->
<div class="card" id="result-card" style="display:none">
<h2>④ 计算结果 <button class="btn-sm" onclick="toggleAllResults()" id="btn-toggle-all">收起全部</button></h2>
<div class="summary-bar" id="summary-bar"></div>
<div id="result-groups"></div>
</div>

<!-- 历史记录 -->
<div class="card">
<h2>📋 历史记录 <button class="btn-sm" onclick="loadHistory()">刷新</button> <button class="btn-sm" style="color:#ff4d4f" onclick="clearAllHistory()">清空全部</button></h2>
<div id="history-list"><div class="hint" style="padding:20px;text-align:center">暂无记录</div></div>
<div id="history-detail" style="display:none;margin-top:12px"></div>
</div>
</div>

<script>
let issueData = null;
let selectedIds = new Set();
let selectedLevels = new Set();

// ── Step 1: 拉取期号 ──
async function fetchIssue() {
    const btn = document.getElementById('btn-fetch');
    const status = document.getElementById('fetch-status');
    const expect = document.getElementById('issue-no').value.trim();
    if (!expect) { status.innerHTML='<span class="status-err">请输入期号</span>'; return; }

    btn.disabled = true; btn.textContent = '⏳ 获取中...'; status.textContent = '';

    try {
        const resp = await fetch('/api/fetch-issue', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({expect})});
        const data = await resp.json();
        if (!data.success) { status.innerHTML = `<span class="status-err">❌ ${data.error}</span>`; return; }

        issueData = data;
        // 按比分SP值降序，默认勾选赔率最高的15场
        const sorted = [...data.matches].sort((a, b) =>
            (b.plays['比分']?.sp || 0) - (a.plays['比分']?.sp || 0)
        );
        selectedIds = new Set(sorted.slice(0, 15).map(m => m.id));
        selectedLevels = new Set();
        status.innerHTML = `<span class="status-ok">✅ 期号 ${data.issue} — ${data.count} 场比赛</span>`;

        renderMatches();
        updateParlayLevels();
        document.getElementById('matches-card').style.display = 'block';
        document.getElementById('parlay-card').style.display = 'block';
        document.getElementById('result-card').style.display = 'none';
    } catch(e) {
        status.innerHTML = `<span class="status-err">❌ 网络错误: ${e.message}</span>`;
    } finally {
        btn.disabled = false; btn.textContent = '获取比赛数据';
    }
}

// ── Step 2: 渲染比赛 ──
function renderMatches() {
    if (!issueData) return;
    const tbody = document.getElementById('match-tbody');
    tbody.innerHTML = issueData.matches.map(m => {
        const checked = selectedIds.has(m.id) ? 'checked' : '';
        const p = m.plays;
        return `<tr class="${checked?'won-row':''}">
        <td><input type="checkbox" ${checked} onchange="toggleMatch('${m.id}',this.checked)"></td>
        <td>${m.id}</td><td>${m.league}</td><td>${m.time}</td>
        <td class="tl">${m.home}</td><td>${m.handicap>0?'+'+m.handicap:m.handicap}</td><td class="tl">${m.away}</td>
        <td>${m.score_text||(m.score_full[0]+':'+m.score_full[1])}</td>
        <td>${p['让球胜平负']?p['让球胜平负'].result+'-'+p['让球胜平负'].sp:'-'}</td>
        <td>${p['总进球数']?p['总进球数'].result+'-'+p['总进球数'].sp:'-'}</td>
        <td>${p['比分']?p['比分'].result+'-'+p['比分'].sp:'-'}</td>
        <td>${p['上下单双']?p['上下单双'].result+'-'+p['上下单双'].sp:'-'}</td>
        <td>${p['半全场']?p['半全场'].result+'-'+p['半全场'].sp:'-'}</td>
        </tr>`;
    }).join('');
    const total = issueData.matches.length;
    document.getElementById('match-count').textContent = `(已选 ${selectedIds.size}/${Math.min(total, 15)} 场，共${total}场，最多15场)`;
}

function toggleMatch(id, checked) {
    if (checked && selectedIds.size >= 15) { alert('最多选择15场比赛'); return; }
    checked ? selectedIds.add(id) : selectedIds.delete(id);
    updateParlayLevels();
    renderMatches();
}

function selectAll() {
    const sorted = [...issueData.matches].sort((a,b) => (b.plays['比分']?.sp||0) - (a.plays['比分']?.sp||0));
    selectedIds = new Set(sorted.slice(0, 15).map(m=>m.id));
    updateParlayLevels(); renderMatches();
}
function deselectAll() { selectedIds = new Set(); updateParlayLevels(); renderMatches(); }

function selectBySP(which) {
    const pt = document.getElementById('sp-play-type').value;
    const sorted = [...issueData.matches].sort((a,b) => {
        const sa = a.plays[pt]?.sp || 0, sb = b.plays[pt]?.sp || 0;
        return which === 'high' ? sb - sa : sa - sb;
    });
    selectedIds = new Set(sorted.slice(0, 15).map(m=>m.id));
    updateParlayLevels(); renderMatches();
}

function selectRandom() {
    const n = Math.min(parseInt(document.getElementById('random-count').value) || 5, 15);
    const pool = [...issueData.matches];
    // Fisher-Yates shuffle
    for (let i = pool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    selectedIds = new Set(pool.slice(0, n).map(m=>m.id));
    updateParlayLevels(); renderMatches();
}

function updateSPButtons() {
    const pt = document.getElementById('sp-play-type').value;
    document.getElementById('btn-sp-high').textContent = pt + '最高SP';
    document.getElementById('btn-sp-low').textContent = pt + '最低SP';
}

// ── Step 3: 串关级别 ──
function updateParlayLevels() {
    const n = selectedIds.size;
    const container = document.getElementById('parlay-chips');
    if (n < 2) { container.innerHTML = '<span class="hint">至少选2场才能串关</span>'; return; }
    selectedLevels = new Set();
    let html = '';
    for (let k = Math.min(n, 15); k >= 2; k--) {
        html += `<span class="chip" onclick="toggleLevel(${k})" id="lvl-${k}">${k}串1 (${combCount(n,k)}注)</span>`;
    }
    container.innerHTML = html;
    updatePreview();
}

function toggleLevel(k) {
    const el = document.getElementById('lvl-'+k);
    if (selectedLevels.has(k)) { selectedLevels.delete(k); el.classList.remove('active'); }
    else { selectedLevels.add(k); el.classList.add('active'); }
    updatePreview();
}

function updatePreview() {
    let total = 0;
    const mult = parseInt(document.getElementById('multiplier').value) || 1;
    for (const k of selectedLevels) total += combCount(selectedIds.size, k);
    document.getElementById('parlay-chips').dataset.preview = total > 0 ? `共 ${total} 注 | ¥${(total*2*mult).toFixed(0)}` : '';
}

function combCount(n,k) { if(k<0||k>n)return 0; let r=1; for(let i=1;i<=k;i++)r=r*(n-k+i)/i; return Math.round(r); }

// ── Step 4: 计算 ──
async function calculateAll() {
    if (selectedIds.size < 2 || selectedLevels.size === 0) {
        document.getElementById('calc-status').innerHTML = '<span class="status-err">请选择至少2场比赛和至少1个串关级别</span>';
        return;
    }
    const btn = document.getElementById('btn-calc');
    const status = document.getElementById('calc-status');
    btn.disabled = true; btn.textContent = '⏳ 计算中...'; status.textContent = '';

    try {
        const resp = await fetch('/api/calculate-batch', {
            method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
                issue_data: issueData,
                selected_ids: [...selectedIds],
                parlay_levels: [...selectedLevels].sort((a,b)=>b-a),
                multiplier: parseInt(document.getElementById('multiplier').value)||1,
            })
        });
        const data = await resp.json();
        if (!data.success) { status.innerHTML = `<span class="status-err">❌ ${data.error}</span>`; return; }

        renderResults(data);
        document.getElementById('result-card').style.display = 'block';
        document.getElementById('result-card').scrollIntoView({behavior:'smooth'});
        status.innerHTML = '<span class="status-ok">✅ 计算完成</span>';
    } catch(e) {
        status.innerHTML = `<span class="status-err">❌ ${e.message}</span>`;
    } finally {
        btn.disabled = false; btn.textContent = '💰 计算全部组合';
    }
}

function renderResults(data) {
    // Summary
    document.getElementById('summary-bar').innerHTML = `
    <div class="summary-item"><div class="num">${data.play_types_count}</div><div class="label">玩法数</div></div>
    <div class="summary-item"><div class="num">¥${data.grand_total.toFixed(2)}</div><div class="label">总奖金(税后)</div></div>`;

    // Per play type
    const groups = document.getElementById('result-groups');
    groups.innerHTML = Object.entries(data.results).map(([name, r]) => {
        const pc = r.net_profit >= 0 ? 'profit' : 'loss';
        const sign = r.net_profit >= 0 ? '+' : '';
        const winCount = r.combos.filter(c=>c.won).length;
        return `<div class="play-group">
        <div class="play-header" onclick="this.nextElementSibling.classList.toggle('collapsed')">
        <span>▼ ${name}</span>
        <span>总投入: ¥${r.total_cost.toFixed(0)} | 总奖金: <span class="${pc}">¥${r.total_prize.toFixed(2)}</span> | 净收益: <span class="${pc}">${sign}¥${r.net_profit.toFixed(2)}</span> | 中${winCount}/${r.combo_count}注</span>
        </div>
        <div class="play-body">
        <table class="play-table">
        <thead><tr><th>组合</th><th>场次</th><th>SP乘积</th><th>中奖</th><th>税前</th><th>税金</th><th>税后</th></tr></thead>
        <tbody>${r.combos.map(c=>`
        <tr>
        <td>${c.combo_desc}</td><td>${c.match_ids.join(',')}</td>
        <td>${c.won?c.sp_product.toFixed(2):'-'}</td>
        <td class="${c.won?'won':'lost'}">${c.won?'中奖':'未中'}</td>
        <td>¥${c.prize_before_tax.toFixed(2)}</td>
        <td>¥${c.tax.toFixed(2)}</td>
        <td style="font-weight:600">¥${c.prize_after_tax.toFixed(2)}</td>
        </tr>`).join('')}</tbody></table></div></div>`;
    }).join('');
}

// ── 收起/展开结果 ──
function toggleAllResults() {
    const bodies = document.querySelectorAll('.play-body');
    const btn = document.getElementById('btn-toggle-all');
    const allCollapsed = [...bodies].every(b => b.classList.contains('collapsed'));
    bodies.forEach(b => b.classList.toggle('collapsed', !allCollapsed));
    btn.textContent = allCollapsed ? '收起全部' : '展开全部';
}

// ── 历史记录 ──
async function loadHistory() {
    try {
        const resp = await fetch('/api/history');
        const data = await resp.json();
        const list = document.getElementById('history-list');
        if (!data.records || data.records.length === 0) {
            list.innerHTML = '<div class="hint" style="padding:20px;text-align:center">暂无记录</div>';
            return;
        }
        list.innerHTML = data.records.map(r => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-bottom:1px solid #f0f0f0;cursor:pointer"
             onclick="viewHistoryDetail('${r.id}')">
        <div>
            <strong>期号 ${r.issue||'-'}</strong>
            <span style="color:#999;font-size:12px;margin-left:8px">${r.time}</span>
            <span style="font-size:12px;margin-left:8px">${r.matches_count}场 ${r.parlay_levels.map(l=>l+'串1').join('+')} ×${r.multiplier}倍</span>
        </div>
        <div>
            <span style="font-weight:700;color:${r.grand_total>0?'#52c41a':'#ff4d4f'}">¥${r.grand_total.toFixed(2)}</span>
            <button class="btn-sm" style="margin-left:8px;color:#ff4d4f" onclick="event.stopPropagation();deleteHistory('${r.id}')">删除</button>
        </div>
        </div>`).join('');
        document.getElementById('history-detail').style.display = 'none';
    } catch(e) { console.error(e); }
}

async function viewHistoryDetail(id) {
    try {
        const resp = await fetch('/api/history/' + id);
        const data = await resp.json();
        if (!data.success) return;
        const r = data.record;
        const detail = document.getElementById('history-detail');
        detail.style.display = 'block';
        detail.innerHTML = `
        <div class="card" style="background:#fafafa">
        <h3>期号 ${r.issue||'-'} — ${r.time} — ${r.matches_count}场 ${r.parlay_levels.map(l=>l+'串1').join('+')} ×${r.multiplier}倍</h3>
        <div style="margin-top:8px">${Object.entries(r.details||{}).map(([name,rd])=>`
        <div class="play-group">
        <div class="play-header"><span>${name}</span>
        <span class="${rd.net_profit>=0?'profit':'loss'}">净收益: ${rd.net_profit>=0?'+':''}¥${rd.net_profit.toFixed(2)} (中${rd.combos.filter(c=>c.won).length}/${rd.combo_count}注)</span>
        </div></div>`).join('')}</div>
        </div>`;
    } catch(e) { console.error(e); }
}

async function deleteHistory(id) {
    if (!confirm('确定删除这条记录？')) return;
    await fetch('/api/history/' + id, { method: 'DELETE' });
    loadHistory();
}

async function clearAllHistory() {
    if (!confirm('确定清空全部历史记录？此操作不可恢复。')) return;
    await fetch('/api/history/all', { method: 'DELETE' });
    loadHistory();
}

loadHistory();
</script>
</body>
</html>
